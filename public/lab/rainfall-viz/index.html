<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三维降雨数据景观 · AquaLeap Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  
  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <style>
    :root {
      --bg-dark: #05070b;
      --panel-bg: rgba(10, 14, 20, 0.88);
      --border-color: rgba(216, 226, 236, 0.15);
      --text-main: #f5f7fb;
      --text-sub: #9db0c3;
      --accent-cyan: #7ed4c8;
      --accent-blue: #4582ec;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-dark);
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      color: var(--text-main);
    }

    #canvas-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Minimal Floating Top Header */
    .top-header {
      position: absolute;
      top: 20px;
      left: 24px;
      right: 24px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .top-header * {
      pointer-events: auto;
    }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(10, 14, 20, 0.75);
      border: 1px solid var(--border-color);
      border-radius: 999px;
      color: var(--text-sub);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      backdrop-filter: blur(16px);
      transition: all 0.2s;
    }

    .nav-back:hover {
      color: #fff;
      border-color: var(--accent-cyan);
      transform: translateY(-1px);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-glass {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(10, 14, 20, 0.75);
      border: 1px solid var(--border-color);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(16px);
      transition: all 0.2s;
    }

    .btn-glass:hover {
      border-color: var(--accent-cyan);
      background: rgba(126, 212, 200, 0.15);
    }

    /* Minimal Bottom Status Bar */
    .bottom-status {
      position: absolute;
      bottom: 24px;
      left: 24px;
      z-index: 10;
      display: flex;
      align-items: flex-end;
      gap: 24px;
      pointer-events: none;
    }

    .bottom-status * {
      pointer-events: auto;
    }

    .main-metric {
      background: rgba(10, 14, 20, 0.75);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 14px 20px;
      backdrop-filter: blur(16px);
    }

    .metric-label {
      font-size: 11px;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .metric-value {
      font-family: "IBM Plex Mono", monospace;
      font-size: 28px;
      font-weight: 600;
      color: var(--text-main);
      margin-top: 2px;
    }

    .metric-value span {
      font-size: 13px;
      color: var(--text-sub);
      font-weight: 400;
    }

    /* Playback Controls */
    .play-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(10, 14, 20, 0.75);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 10px 16px;
      backdrop-filter: blur(16px);
    }

    .btn-play {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-play:hover {
      background: var(--accent-cyan);
      color: #000;
    }

    /* Left Slide-out Data Drawer Editor */
    .drawer-panel {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 340px;
      z-index: 30;
      background: var(--panel-bg);
      border-right: 1px solid var(--border-color);
      backdrop-filter: blur(24px);
      transform: translateX(-100%);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 16px 0 48px rgba(0, 0, 0, 0.6);
    }

    .drawer-panel.open {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .drawer-title {
      font-family: "Sora", sans-serif;
      font-size: 16px;
      font-weight: 700;
    }

    .btn-close {
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }

    .btn-close:hover {
      color: #fff;
    }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .drawer-body::-webkit-scrollbar {
      width: 4px;
    }
    .drawer-body::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
    }

    .sparkline-box {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 20px;
    }

    .data-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .data-time {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      color: var(--text-sub);
      width: 45px;
    }

    .data-input-range {
      flex: 1;
      height: 4px;
      accent-color: var(--accent-cyan);
      cursor: pointer;
    }

    .data-val {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      color: var(--text-main);
      width: 45px;
      text-align: right;
    }

    .drawer-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
    }

    .btn-drawer {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      transition: all 0.2s;
    }

    .btn-drawer-primary {
      background: var(--accent-cyan);
      color: #05070b;
      border: none;
      font-weight: 600;
    }

    .btn-drawer-primary:hover {
      background: #9db0c3;
    }

    /* 3D Canvas HTML Labels */
    .axis-label-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }

    .3d-label {
      position: absolute;
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      color: rgba(157, 176, 195, 0.6);
      transform: translate(-50%, -50%);
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Three.js Canvas -->
  <div id="canvas-container"></div>

  <!-- HTML Labels along 3D Axis -->
  <div id="axis-labels" class="axis-label-container"></div>

  <!-- Top Glass Header -->
  <div class="top-header">
    <a href="/lab/" class="nav-back">← 返回实验室</a>
    <div class="header-actions">
      <button class="btn-glass" id="btn-open-drawer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        编辑数据 (25 点)
      </button>
    </div>
  </div>

  <!-- Bottom Main Status Overlay -->
  <div class="bottom-status">
    <div class="main-metric">
      <div class="metric-label">三维降雨数据景观 · 当前最大降雨量</div>
      <div class="metric-value" id="disp-max-rain">48.5 <span>mm/h</span></div>
    </div>
    <div class="play-controls">
      <button class="btn-play" id="btn-play-pause" aria-label="播放/暂停">
        <svg id="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        <svg id="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <div style="font-size: 12px; color: var(--text-sub);">
        时间轴: <span id="disp-current-time" style="color:#fff; font-family:'IBM Plex Mono'; font-weight:600;">14:00</span>
      </div>
    </div>
  </div>

  <!-- Left Slide-out Data Drawer Editor -->
  <div class="drawer-panel" id="drawer">
    <div class="drawer-header">
      <div class="drawer-title">降雨数据序列编辑器</div>
      <button class="btn-close" id="btn-close-drawer">×</button>
    </div>
    <div class="drawer-body">
      <div class="sparkline-box">
        <svg id="sparkline-svg" width="100%" height="50" style="overflow:visible;"></svg>
      </div>
      <div id="drawer-sliders-container"></div>
    </div>
    <div class="drawer-footer">
      <button class="btn-drawer" id="btn-reset-data">重置数据</button>
      <button class="btn-drawer btn-drawer-primary" id="btn-random-data">生成随机雨暴</button>
    </div>
  </div>

  <script>
    // ==========================================
    // 1. DATA MODEL & SMOOTH INTERPOLATION
    // ==========================================
    const HOURS_COUNT = 25;
    const timeLabels = [];
    for (let i = 0; i < HOURS_COUNT; i++) {
      const h = String(i).padStart(2, '0');
      timeLabels.push(`${h}:00`);
    }

    const defaultRainData = [
      1.2, 0.8, 0.5, 0.2, 0.1, 0.4, 2.5, 6.8, 14.2, 28.5,
      48.5, 36.2, 22.0, 15.4, 8.2, 19.5, 38.0, 42.1, 26.4, 12.0,
      5.1, 2.3, 1.0, 0.4, 0.1
    ];

    let rainData = [...defaultRainData];
    let maxRainfall = Math.max(...rainData);

    function getRainfallAtX(xNorm) {
      const clamped = Math.max(0, Math.min(1, xNorm));
      const floatIdx = clamped * (HOURS_COUNT - 1);
      const idx0 = Math.floor(floatIdx);
      const idx1 = Math.min(HOURS_COUNT - 1, idx0 + 1);
      const t = floatIdx - idx0;

      const smoothT = t * t * (3 - 2 * t);
      return rainData[idx0] + (rainData[idx1] - rainData[idx0]) * smoothT;
    }

    function getNormalizedIntensityAtX(xNorm) {
      const val = getRainfallAtX(xNorm);
      const maxVal = Math.max(1, maxRainfall);
      return Math.log1p(val) / Math.log1p(maxVal);
    }

    // ==========================================
    // 2. THREE.JS SCENE, CAMERA, RENDERER
    // ==========================================
    const container = document.getElementById("canvas-container");
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05070b);
    scene.fog = new THREE.FogExp2(0x05070b, 0.015);

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(-20, 20, 50);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.9;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enablePan = false;
    controls.maxPolarAngle = Math.PI / 2 - 0.02;
    controls.minDistance = 15;
    controls.maxDistance = 120;
    controls.target.set(0, 3, 0);

    // ==========================================
    // 3. LIGHTING & WET REFLECTIVE GROUND
    // ==========================================
    const ambientLight = new THREE.AmbientLight(0xd8e2ec, 0.3);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0x7ed4c8, 0.9);
    dirLight.position.set(10, 40, 20);
    scene.add(dirLight);

    // Ground Plane along X axis (-60 to +60)
    const groundGeo = new THREE.PlaneGeometry(130, 45, 64, 32);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x080c14,
      roughness: 0.15,
      metalness: 0.1,
    });
    const groundMesh = new THREE.Mesh(groundGeo, groundMat);
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.position.set(0, 0, 0);
    scene.add(groundMesh);

    // Ground Grid Line along Time Axis
    const gridHelper = new THREE.GridHelper(120, 30, 0x7ed4c8, 0x1e2b3c);
    gridHelper.position.set(0, 0.02, 0);
    gridHelper.material.opacity = 0.15;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    // ==========================================
    // 4. INSTANCED GPU RAIN PARTICLES SHADER
    // ==========================================
    const RAIN_COUNT = 16000;
    const rainGeo = new THREE.BufferGeometry();

    const positions = new Float32Array(RAIN_COUNT * 3);
    const randoms = new Float32Array(RAIN_COUNT * 3);
    const intensities = new Float32Array(RAIN_COUNT);

    const X_MIN = -55;
    const X_MAX = 55;
    const Z_MIN = -12;
    const Z_MAX = 12;
    const Y_MAX = 32;

    for (let i = 0; i < RAIN_COUNT; i++) {
      const px = X_MIN + Math.random() * (X_MAX - X_MIN);
      const py = Math.random() * Y_MAX;
      const pz = Z_MIN + Math.random() * (Z_MAX - Z_MIN);

      positions[i * 3 + 0] = px;
      positions[i * 3 + 1] = py;
      positions[i * 3 + 2] = pz;

      randoms[i * 3 + 0] = Math.random(); // speed offset
      randoms[i * 3 + 1] = Math.random(); // length offset
      randoms[i * 3 + 2] = Math.random(); // phase offset

      const xNorm = (px - X_MIN) / (X_MAX - X_MIN);
      intensities[i] = getNormalizedIntensityAtX(xNorm);
    }

    rainGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    rainGeo.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));
    const intensityAttr = new THREE.BufferAttribute(intensities, 1);
    rainGeo.setAttribute('aIntensity', intensityAttr);

    // Custom Rain Line GLSL Shader
    const rainShaderMat = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0 }
      },
      vertexShader: `
        uniform float uTime;
        attribute vec3 aRandom;
        attribute float aIntensity;
        varying float vOpacity;
        varying float vIntensity;

        void main() {
          vec3 pos = position;
          vIntensity = aIntensity;

          float speed = 18.0 + aRandom.x * 12.0 + aIntensity * 15.0;
          float fallHeight = 32.0;
          
          pos.y = mod(pos.y - uTime * speed + aRandom.y * fallHeight, fallHeight);
          pos.x += (pos.y / fallHeight) * 1.5;

          if (aRandom.z > aIntensity * 1.25) {
            vOpacity = 0.0;
          } else {
            vOpacity = (0.25 + 0.75 * aIntensity) * (0.4 + 0.6 * aRandom.x);
          }

          vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
          gl_PointSize = (2.0 + aIntensity * 2.5 + aRandom.y * 1.0) * (24.0 / -mvPosition.z);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying float vOpacity;
        varying float vIntensity;

        void main() {
          if (vOpacity <= 0.01) discard;
          vec3 baseColor = mix(vec3(0.61, 0.69, 0.76), vec3(0.88, 0.96, 1.0), vIntensity);
          gl_FragColor = vec4(baseColor, vOpacity);
        }
      `
    });

    const rainParticles = new THREE.Points(rainGeo, rainShaderMat);
    scene.add(rainParticles);

    function updateRainIntensities() {
      const attr = rainGeo.attributes.aIntensity;
      const posArr = rainGeo.attributes.position.array;
      for (let i = 0; i < RAIN_COUNT; i++) {
        const px = posArr[i * 3 + 0];
        const xNorm = (px - X_MIN) / (X_MAX - X_MIN);
        attr.array[i] = getNormalizedIntensityAtX(xNorm);
      }
      attr.needsUpdate = true;

      // Update Splash
      const splashAttr = splashGeo.attributes.aIntensity;
      const splashPosArr = splashGeo.attributes.position.array;
      for (let i = 0; i < SPLASH_COUNT; i++) {
        const px = splashPosArr[i * 3 + 0];
        const xNorm = (px - X_MIN) / (X_MAX - X_MIN);
        splashAttr.array[i] = getNormalizedIntensityAtX(xNorm);
      }
      splashAttr.needsUpdate = true;
    }

    // ==========================================
    // 5. GROUND SPLASH & RIPPLE SYSTEM
    // ==========================================
    const SPLASH_COUNT = 1200;
    const splashGeo = new THREE.BufferGeometry();
    const splashPos = new Float32Array(SPLASH_COUNT * 3);
    const splashRandoms = new Float32Array(SPLASH_COUNT * 3);
    const splashIntensities = new Float32Array(SPLASH_COUNT);

    for (let i = 0; i < SPLASH_COUNT; i++) {
      const px = X_MIN + Math.random() * (X_MAX - X_MIN);
      splashPos[i * 3 + 0] = px;
      splashPos[i * 3 + 1] = 0.05;
      splashPos[i * 3 + 2] = Z_MIN + Math.random() * (Z_MAX - Z_MIN);

      splashRandoms[i * 3 + 0] = Math.random();
      splashRandoms[i * 3 + 1] = Math.random();
      splashRandoms[i * 3 + 2] = Math.random();

      const xNorm = (px - X_MIN) / (X_MAX - X_MIN);
      splashIntensities[i] = getNormalizedIntensityAtX(xNorm);
    }

    splashGeo.setAttribute('position', new THREE.BufferAttribute(splashPos, 3));
    splashGeo.setAttribute('aRandom', new THREE.BufferAttribute(splashRandoms, 3));
    splashGeo.setAttribute('aIntensity', new THREE.BufferAttribute(splashIntensities, 1));

    const splashShaderMat = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0 }
      },
      vertexShader: `
        uniform float uTime;
        attribute vec3 aRandom;
        attribute float aIntensity;
        varying float vAlpha;

        void main() {
          vec3 pos = position;
          float cycle = mod(uTime * (3.0 + aRandom.x * 4.0) + aRandom.y * 10.0, 1.0);
          pos.y = sin(cycle * 3.14159) * (0.3 + aIntensity * 0.8);

          if (aRandom.z > aIntensity) {
            vAlpha = 0.0;
          } else {
            vAlpha = (1.0 - cycle) * aIntensity * 0.8;
          }

          vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
          gl_PointSize = (2.5 + cycle * 4.5) * (20.0 / -mvPosition.z);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying float vAlpha;
        void main() {
          if (vAlpha <= 0.01) discard;
          gl_FragColor = vec4(0.85, 0.95, 1.0, vAlpha);
        }
      `
    });

    const splashParticles = new THREE.Points(splashGeo, splashShaderMat);
    scene.add(splashParticles);

    // ==========================================
    // 6. HTML 3D TIME AXIS LABELS
    // ==========================================
    const axisLabelsContainer = document.getElementById("axis-labels");
    const labelElements = [];

    const labelIndices = [0, 4, 8, 12, 16, 20, 24];
    labelIndices.forEach((idx) => {
      const div = document.createElement("div");
      div.className = "3d-label";
      div.innerText = timeLabels[idx];
      axisLabelsContainer.appendChild(div);

      const posX = X_MIN + (idx / 24) * (X_MAX - X_MIN);
      labelElements.push({ el: div, pos: new THREE.Vector3(posX, -0.5, 14) });
    });

    function update3DLabels() {
      const tempV = new THREE.Vector3();
      labelElements.forEach((item) => {
        tempV.copy(item.pos);
        tempV.project(camera);

        const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-tempV.y * 0.5 + 0.5) * window.innerHeight;

        item.el.style.left = `${x}px`;
        item.el.style.top = `${y}px`;
        item.el.style.opacity = tempV.z < 1 ? "1" : "0";
      });
    }

    // ==========================================
    // 7. DRAWER & SPARKLINE DATA EDITOR
    // ==========================================
    const drawer = document.getElementById("drawer");
    const slidersContainer = document.getElementById("drawer-sliders-container");
    const sparklineSvg = document.getElementById("sparkline-svg");

    document.getElementById("btn-open-drawer").addEventListener("click", () => drawer.classList.add("open"));
    document.getElementById("btn-close-drawer").addEventListener("click", () => drawer.classList.remove("open"));

    timeLabels.forEach((timeStr, i) => {
      const row = document.createElement("div");
      row.className = "data-row";
      row.innerHTML = `
        <span class="data-time">${timeStr}</span>
        <input type="range" class="data-input-range" min="0" max="60" step="0.5" value="${rainData[i]}" data-idx="${i}">
        <span class="data-val" id="val-disp-${i}">${rainData[i].toFixed(1)}</span>
      `;
      slidersContainer.appendChild(row);
    });

    slidersContainer.addEventListener("input", (e) => {
      const target = e.target;
      if (target && target.matches(".data-input-range")) {
        const idx = parseInt(target.getAttribute("data-idx"));
        const val = parseFloat(target.value);
        rainData[idx] = val;
        document.getElementById(`val-disp-${idx}`).innerText = val.toFixed(1);
        
        maxRainfall = Math.max(...rainData);
        document.getElementById("disp-max-rain").innerHTML = `${maxRainfall.toFixed(1)} <span>mm/h</span>`;
        
        updateRainIntensities();
        renderSparkline();
      }
    });

    document.getElementById("btn-reset-data").addEventListener("click", () => {
      rainData = [...defaultRainData];
      maxRainfall = Math.max(...rainData);
      document.getElementById("disp-max-rain").innerHTML = `${maxRainfall.toFixed(1)} <span>mm/h</span>`;
      
      timeLabels.forEach((_, i) => {
        const input = slidersContainer.querySelector(`input[data-idx="${i}"]`);
        if (input) input.value = rainData[i];
        document.getElementById(`val-disp-${i}`).innerText = rainData[i].toFixed(1);
      });
      updateRainIntensities();
      renderSparkline();
    });

    document.getElementById("btn-random-data").addEventListener("click", () => {
      for (let i = 0; i < HOURS_COUNT; i++) {
        const center = 12 + Math.sin(i * 0.4) * 6;
        const dist = Math.abs(i - center);
        rainData[i] = Math.max(0.1, parseFloat((Math.max(0, 50 - dist * 4) * Math.random()).toFixed(1)));
      }
      maxRainfall = Math.max(...rainData);
      document.getElementById("disp-max-rain").innerHTML = `${maxRainfall.toFixed(1)} <span>mm/h</span>`;
      
      timeLabels.forEach((_, i) => {
        const input = slidersContainer.querySelector(`input[data-idx="${i}"]`);
        if (input) input.value = rainData[i];
        document.getElementById(`val-disp-${i}`).innerText = rainData[i].toFixed(1);
      });
      updateRainIntensities();
      renderSparkline();
    });

    function renderSparkline() {
      const w = sparklineSvg.clientWidth || 280;
      const h = 50;
      const maxVal = Math.max(1, maxRainfall);

      let d = "";
      rainData.forEach((val, i) => {
        const x = (i / (HOURS_COUNT - 1)) * w;
        const y = h - 5 - (val / maxVal) * (h - 10);
        if (i === 0) d += `M ${x} ${y}`;
        else d += ` L ${x} ${y}`;
      });

      sparklineSvg.innerHTML = `
        <path d="${d}" fill="none" stroke="#7ed4c8" stroke-width="2"/>
      `;
    }
    setTimeout(renderSparkline, 200);

    // ==========================================
    // 8. PLAYBACK & ANIMATION LOOP
    // ==========================================
    let isPlaying = true;
    let clock = new THREE.Clock();

    const btnPlayPause = document.getElementById("btn-play-pause");
    const iconPlay = document.getElementById("icon-play");
    const iconPause = document.getElementById("icon-pause");

    btnPlayPause.addEventListener("click", () => {
      isPlaying = !isPlaying;
      iconPlay.style.display = isPlaying ? "none" : "block";
      iconPause.style.display = isPlaying ? "block" : "none";
    });

    let animTime = 0;

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      if (isPlaying) {
        animTime += delta;
      }

      rainShaderMat.uniforms.uTime.value = animTime;
      splashShaderMat.uniforms.uTime.value = animTime;

      controls.update();
      if (isPlaying) {
        camera.position.x += Math.sin(animTime * 0.2) * 0.015;
      }

      update3DLabels();

      const currHourIndex = Math.floor((animTime * 0.5) % 25);
      document.getElementById("disp-current-time").innerText = timeLabels[currHourIndex];

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderSparkline();
    });
  </script>
</body>
</html>
