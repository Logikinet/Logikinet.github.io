<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>喜欢你 · AquaLeap Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="喜欢你文字漂浮小游戏 — AquaLeap 实验室" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background:
                radial-gradient(circle, #2b0b18, #000);
            font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif;
        }

        .word {
            position: absolute;
            color: #fff;
            font-size: 20px;
            opacity: 0.8;
            animation: float 8s linear forwards;
            text-shadow:
                0 0 10px #ff4d88,
                0 0 20px #ff4d88;
            pointer-events: none;
            white-space: nowrap;
        }

        @keyframes float {
            0% {
                transform:
                    translateY(100vh) scale(0.5) rotate(0deg);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform:
                    translateY(-20vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 40px;
            text-align: center;
            text-shadow:
                0 0 20px pink;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            font-size: 30px;
            animation:
                boom 1s ease forwards;
            pointer-events: none;
        }

        @keyframes boom {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(2);
                opacity: 0;
            }
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.35);
        }

        .back:hover {
            background: rgba(0, 0, 0, 0.55);
        }

        @media (prefers-reduced-motion: reduce) {
            .word,
            .heart {
                animation: none !important;
            }
        }
    </style>
</head>

<body>
    <a class="back" href="/lab/">← 返回实验室</a>
    <div class="center" aria-hidden="true">喜欢你</div>

    <script>
        let words = [
            "喜欢你",
            "想见你",
            "陪着你",
            "一直在",
            "晚安",
            "好想你",
            "小幸运",
            "遇见你真好",
            "偷偷开心",
            "心动了",
            "我的宝藏",
            "刚好是你",
            "偏爱你",
            "永远支持你"
        ];

        function createWord() {
            let span = document.createElement("div");
            span.className = "word";
            span.textContent = words[Math.floor(Math.random() * words.length)];
            span.style.left = Math.random() * 100 + "vw";
            span.style.fontSize = 15 + Math.random() * 25 + "px";
            span.style.animationDuration = 5 + Math.random() * 5 + "s";
            document.body.appendChild(span);
            setTimeout(() => {
                span.remove();
            }, 9000);
        }

        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (!reduceMotion) {
            setInterval(createWord, 300);
        }

        // 点击爱心
        document.onclick = function (e) {
            if (e.target && e.target.closest && e.target.closest("a")) return;
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.textContent = "❤️";
            heart.style.left = e.clientX + "px";
            heart.style.top = e.clientY + "px";
            document.body.appendChild(heart);
            setTimeout(() => {
                heart.remove();
            }, 1000);
        };
    </script>
</body>

</html>
