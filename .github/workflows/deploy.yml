name: Deploy AquaLeap to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 公开仓 README 无需 token；跨仓库私有 README 请在仓库 Secrets 配置 PROJECT_SYNC_TOKEN（repo 范围 PAT）
      - name: Sync project READMEs
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_USER: Logikinet
        run: npm run sync:projects

      - name: Build
        run: npm run build:ci

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
