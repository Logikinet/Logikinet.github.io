name: Deploy AquaLeap to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      source_repository:
        description: "触发同步的项目仓库"
        required: false
        type: string
      source_sha:
        description: "触发同步的提交 SHA"
        required: false
        type: string
      sync_reason:
        description: "触发原因"
        required: false
        default: "manual"
        type: string

  schedule:
    # UTC 每日一次，故障兜底（非主同步方式）
    - cron: "20 18 * * *"

  repository_dispatch:
    types:
      - sync-projects
      - sync-ai-output-formatter

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout AI Output Formatter
        uses: actions/checkout@v4
        with:
          repository: Logikinet/AI-Output-Formatter
          ref: main
          path: external/AI-Output-Formatter

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            external/AI-Output-Formatter/package-lock.json

      - name: Install site dependencies
        run: npm ci

      - name: Install AI Output Formatter dependencies
        working-directory: external/AI-Output-Formatter
        run: npm ci

      - name: Log sync context
        env:
          SOURCE_REPOSITORY: ${{ inputs.source_repository || github.event.client_payload.source_repository || '' }}
          SOURCE_SHA: ${{ inputs.source_sha || github.event.client_payload.source_sha || '' }}
          SYNC_REASON: ${{ inputs.sync_reason || github.event.client_payload.sync_reason || github.event_name }}
        run: |
          echo "sync_reason=${SYNC_REASON}"
          echo "source_repository=${SOURCE_REPOSITORY:-"(all)"}"
          echo "source_sha=${SOURCE_SHA:-"(none)"}"
          if [ -n "${{ secrets.PROJECTS_READ_TOKEN }}" ]; then
            echo "PROJECTS_READ_TOKEN=configured"
          else
            echo "PROJECTS_READ_TOKEN=missing (public ok, private use cache)"
          fi

      - name: Sync project READMEs
        env:
          PROJECTS_READ_TOKEN: ${{ secrets.PROJECTS_READ_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: Logikinet
          SOURCE_REPOSITORY: ${{ inputs.source_repository || github.event.client_payload.source_repository || '' }}
          SOURCE_SHA: ${{ inputs.source_sha || github.event.client_payload.source_sha || '' }}
          SYNC_REASON: ${{ inputs.sync_reason || github.event.client_payload.sync_reason || github.event_name }}
        run: npm run sync:projects

      - name: Build AI Output Formatter
        working-directory: external/AI-Output-Formatter
        env:
          VITE_BASE_PATH: /tools/ai-output-formatter/
        run: npm run build

      - name: Build site
        run: npm run build:ci

      - name: Integrate AI Output Formatter
        run: |
          rm -rf dist/tools/ai-output-formatter
          mkdir -p dist/tools/ai-output-formatter
          cp -R external/AI-Output-Formatter/dist/. dist/tools/ai-output-formatter/
          test -f dist/tools/ai-output-formatter/index.html
          echo "Integrated AOF into dist/tools/ai-output-formatter/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
