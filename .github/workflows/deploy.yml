name: Deploy AquaLeap to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 每日 16:00 UTC ≈ 北京时间次日 00:00
    - cron: "0 16 * * *"
  repository_dispatch:
    types: [sync-projects]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 公开仓无需 token；私有 README 请配置 PROJECTS_READ_TOKEN（只读 contents+metadata）
      # 不打印 Secret；sync 脚本失败时保留缓存且 exit 0
      - name: Sync project READMEs
        env:
          PROJECTS_READ_TOKEN: ${{ secrets.PROJECTS_READ_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: Logikinet
        run: npm run sync:projects

      - name: Build site
        run: npm run build:ci

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
